<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>NeuroWriter</title>
  <desc>Logo for NeuroWriter showing selection, clipboard, and global hotkey feeding into a multi-provider AI back-end that returns a polished writing output.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title + tagline -->
  <text x="340" y="52" text-anchor="middle"
        style="fill:rgb(20,20,19);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:30px;font-weight:500;">NeuroWriter</text>
  <text x="340" y="80" text-anchor="middle"
        style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:400;">offline-first AI writing assistant</text>

  <!-- INPUT 1: selection (blue) -->
  <g>
    <rect x="50" y="130" width="140" height="44" rx="6"
          style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:1px;"/>
    <text x="120" y="157" text-anchor="middle"
          style="fill:rgb(12,68,124);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">selection</text>
  </g>

  <!-- INPUT 2: clipboard (green) -->
  <g>
    <rect x="50" y="188" width="140" height="44" rx="6"
          style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:1px;"/>
    <text x="120" y="215" text-anchor="middle"
          style="fill:rgb(8,80,65);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">clipboard</text>
  </g>

  <!-- INPUT 3: hotkey (amber) -->
  <g>
    <rect x="50" y="246" width="140" height="44" rx="6"
          style="fill:rgb(250,238,218);stroke:rgb(133,79,11);stroke-width:1px;"/>
    <text x="120" y="273" text-anchor="middle"
          style="fill:rgb(99,56,6);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:500;">⌘ global hotkey</text>
  </g>

  <!-- Arrows: inputs -> processor -->
  <path d="M 195 152 Q 240 152 282 208" fill="none"
        stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="195" y1="210" x2="282" y2="210"
        stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 195 268 Q 240 268 282 212" fill="none"
        stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PROCESSOR: model router (neutral) -->
  <g>
    <rect x="290" y="180" width="148" height="62" rx="8"
          style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:1px;"/>
    <text x="364" y="206" text-anchor="middle"
          style="fill:rgb(68,68,65);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;font-weight:500;">model router</text>
    <text x="364" y="226" text-anchor="middle"
          style="fill:rgb(110,108,103);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:400;">Claude · GPT · Gemini · 11 more</text>
  </g>

  <!-- Arrow: processor -> output -->
  <line x1="443" y1="210" x2="488" y2="210"
        stroke="rgba(31,30,29,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT: chat bubble (violet) -->
  <g>
    <path d="M 496 160 L 626 160 Q 636 160 636 170 L 636 240 Q 636 250 626 250 L 540 250 L 520 270 L 524 250 L 496 250 Q 486 250 486 240 L 486 170 Q 486 160 496 160 Z"
          style="fill:rgb(237,232,250);stroke:rgb(91,67,158);stroke-width:1px;"/>
    <text x="561" y="200" text-anchor="middle"
          style="fill:rgb(60,40,120);font-family:'Anthropic Serif',Georgia,'Times New Roman',serif;font-size:24px;font-weight:500;">writing</text>
    <text x="561" y="226" text-anchor="middle"
          style="fill:rgb(91,67,158);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:400;">polished · streamed · in tray</text>
  </g>

  <!-- Footer tagline -->
  <text x="340" y="335" text-anchor="middle"
        style="fill:rgb(61,61,58);font-family:'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:400;">BYO API keys · lives in your system tray · 14+ providers</text>
</svg>
