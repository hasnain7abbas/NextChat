name: Build and Release NeuroWriter

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: yarn install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NeuroWriter ${{ github.ref_name }}'
          releaseBody: |
            ## NeuroWriter ${{ github.ref_name }}

            Offline AI Writing Assistant with global hotkey, clipboard pipeline, and system tray.

            ### What's New
            - Global hotkey (Ctrl+Shift+A) to toggle window
            - System tray with quick actions (Summarize, Rewrite, Translate, Fix Grammar, Explain)
            - Clipboard pipeline for instant AI processing
            - Enhanced prompt template library with categories, tags, and import/export

            ### Installation
            Download the `.exe` installer below and run it.
          releaseDraft: true
          prerelease: false
